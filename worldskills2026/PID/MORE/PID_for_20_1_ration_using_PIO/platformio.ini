# platformio.ini - ESP32-S3 Configuration for PID Motor Control
# 
# This file is used by PlatformIO to configure your project settings.
# Copy this to your project root directory.
#
# For more information:
# - https://docs.platformio.org/en/latest/projectconf/index.html
# - https://docs.platformio.org/en/latest/platforms/espressif32.html

[platformio]
# Default environment when no specific one is selected
default_envs = esp32-s3-devkitc-1
# Name of the default project folder
src_dir = src

[env:esp32-s3-devkitc-1]
# Platform and board specification
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

# ===== SERIAL MONITOR SETTINGS =====
# Baud rate for Serial communication (must match Serial.begin() in code)
monitor_speed = 115200

# Speed for uploading firmware to board
upload_speed = 921600

# Optional: Specify the COM port (auto-detect if empty)
# Uncomment and change to your port (COM3, /dev/ttyUSB0, etc.)
# monitor_port = COM3
# upload_port = COM3

# ===== COMPILER FLAGS =====
# Build flags for optimization and debugging
build_flags = 
    -DCORE_DEBUG_LEVEL=0

# Optional: Enable verbose output during build
# build_flags = -DCORE_DEBUG_LEVEL=2

# ===== OPTIMIZATION =====
# Use optimization level -O2 for better performance
build_unflags = -O2
build_flags = -O3

# ===== PARALLEL BUILDS =====
# Compile multiple files in parallel (faster build times)
build_flags = -j4

# ===== LIBRARY DEPENDENCIES =====
# Add any library dependencies here (if needed)
# Examples:
#   lib_deps = 
#       adafruit/Adafruit_SSD1306
#       arduino-libraries/Servo
#
# For this project, we only use built-in Arduino libraries
lib_deps = 

# ===== ADVANCED OPTIONS =====

# Debug symbols (disable to reduce binary size)
# build_flags = -g

# Enable core debug output (verbose - slows down)
# build_flags = -DCORE_DEBUG_LEVEL=5

# Remove unused code and data (reduces binary size)
build_flags = 
    -Wl,--gc-sections
    -ffunction-sections
    -fdata-sections

# ===== MONITOR SETTINGS =====
# Filter to show only output from code (no system messages)
monitor_filters = 
    esp32_exception_decoder

# Raw output without filtering
# monitor_filters = 

# ===== UPLOAD SETTINGS =====
# Flash size
board_upload.flash_size = 16MB

# Use DFU for upload if needed
# upload_protocol = dfu

# Standard UART protocol (default)
upload_protocol = esptool

# ===== TESTING =====
# Test port (usually same as upload)
test_port = ${env.monitor_port}

# ===== ADDITIONAL NOTES =====
# 
# LED Configuration (if using):
# - Built-in LED typically on GPIO 46 or 48 on ESP32-S3
# - You don't need this for motor control
#
# PSRAM:
# - ESP32-S3 DevKit includes 8MB PSRAM
# - Automatically detected and available
#
# GPIO Pins (available on ESP32-S3):
# - Digital: 0-21, 26-33, 34-39, 40-48
# - ADC: 0-20
# - I2C: Flexible (we use GPIO 4, 5)
# - SPI: Flexible
# - UART: Flexible
#
# Your Motor Setup:
# - Encoder A: GPIO 4 (with pull-up)
# - Encoder B: GPIO 5 (with pull-up)
# - Motor PWM: GPIO 9
# - Motor DIR: GPIO 8
#
# Serial:
# - Default UART0: RX=44, TX=43 (programming port)
# - UART1: RX=18, TX=17
# - UART2: RX=16, TX=15

# ===== SPEED OPTIMIZATION =====
# If build is slow, try these:
#
# 1. Enable parallel compilation (already enabled above with -j4)
# 2. Disable linking optimization:
#    upload_speed = 460800  (slower upload, faster build)
# 3. Use faster compiler:
#    ; Already using fastest available
#
# If upload fails:
# - Reduce upload_speed to 460800
# - Check USB cable quality
# - Try different USB port
# - Update ESP32 USB drivers

# ===== TROUBLESHOOTING =====
# 
# Board not detected:
#   - Check USB cable
#   - Try: platformio device list
#   - Update drivers
#
# Compilation fails:
#   - Clean build: platformio run --target clean
#   - Check for missing #include <Arduino.h> in main.cpp
#   - Verify board selection: board = esp32-s3-devkitc-1
#
# Upload fails:
#   - Reduce upload_speed to 460800
#   - Try holding BOOT button during upload
#   - Check board_upload.flash_size setting
#
# Monitor shows garbage:
#   - Verify monitor_speed = 115200 matches code
#   - Check USB cable is good
#   - Try different baud rate
#
# Compilation too slow:
#   - Already configured for speed above
#   - Consider removing debug symbols
#   - Check disk space (SSD vs HDD)

# ===== USEFUL CLI COMMANDS =====
#
# Build:
#   platformio run
#
# Build and upload:
#   platformio run --target upload
#
# Upload with monitor:
#   platformio run --target upload --target monitor
#
# Monitor only:
#   platformio device monitor --baud 115200
#
# Clean build:
#   platformio run --target clean
#
# List boards:
#   platformio boards esp32
#
# List devices:
#   platformio device list
#
# Verbose output:
#   platformio run --target upload --verbose
#
# Specific environment:
#   platformio run -e esp32-s3-devkitc-1

# ===== VS CODE SHORTCUTS =====
#
# Build:               Ctrl+Alt+B
# Upload:              Ctrl+Alt+U
# Upload and monitor:  Ctrl+Alt+D
# Monitor:             Ctrl+Shift+A then select Monitor
# Serial Port Monitor: Ctrl+Shift+A then search "Monitor"
# PlatformIO home:     Ctrl+Shift+A then search "Home"
#
# Global commands:     Ctrl+Shift+P
# Command palette:     Ctrl+Shift+P

# ===== CONFIGURATION COMPLETE =====
#
# Your ESP32-S3 project is ready!
